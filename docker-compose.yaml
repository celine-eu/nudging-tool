volumes:
  pgdata:

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8016:8016"
    environment:
      SEED_DIR: /app/seed
      ORCHESTRATOR_URL: http://localhost:8016/nudging
      # VAPID keys — generate with: nudging-cli vapid generate
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
      VAPID_SUBJECT: "mailto:dev@celine.localhost"
    volumes:
      - ./seed:/app/seed
      - ./.env:/app/.env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8016/health'').read()"',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
      - "api.celine.localhost:host-gateway"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    command: ["alembic", "upgrade", "head"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
